# Author: Devadarshini M
services:
  db:
    image: mysql:8.0
    container_name: vehiserve-db
    environment:
      MYSQL_ROOT_PASSWORD: RMAh@7865
      MYSQL_DATABASE: vehicle_service
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - vehiserve-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRMAh@7865"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: vehiserve-app
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/vehicle_service?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=RMAh@7865
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vehiserve-network

volumes:
  mysql-data:

networks:
  vehiserve-network:
