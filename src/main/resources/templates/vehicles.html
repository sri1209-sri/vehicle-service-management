<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: page(~{::title}, ~{::#content}, 'vehicles')}">
<head>
    <title>Manage Vehicles | Vehi-Serve Admin</title>
</head>
<body>
    <div id="content">
        <div class="card">
            <div class="card-header">
                <div class="card-title">Vehicles Registry</div>
                <button class="btn btn-primary" onclick="openModal('addVehicleModal')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Add Vehicle
                </button>
            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Plate Number</th>
                            <th>Brand / Make</th>
                            <th>Model</th>
                            <th>Year</th>
                            <th>Owner (Customer)</th>
                            <th class="no-print" style="width: 180px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="v : ${vehicles}">
                            <td th:text="${v.vehicleId}">1</td>
                            <td style="font-weight: 600;" th:text="${v.vehicleNumber}">MH-12-AB-1234</td>
                            <td th:text="${v.brand}">Toyota</td>
                            <td th:text="${v.model}">Corolla</td>
                            <td th:text="${v.year}">2021</td>
                            <td th:text="${v.customer.name}">Owner Name</td>
                            <td class="no-print">
                                <div style="display: flex; gap: 0.5rem;">
                                    <button class="btn btn-secondary btn-sm" style="color: var(--primary);" th:onclick="'editVehicle(' + ${v.vehicleId} + ')'">Edit</button>
                                    <button class="btn btn-secondary btn-sm" style="color: var(--danger);" th:onclick="'deleteVehicle(' + ${v.vehicleId} + ')'">Delete</button>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(vehicles)}">
                            <td colspan="7" style="text-align: center; color: var(--text-secondary); padding: 2rem;">No vehicles found. Add a vehicle and link it to a customer!</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add Vehicle Modal -->
        <div id="addVehicleModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">Add Vehicle</h2>
                    <button class="modal-close" onclick="closeModal('addVehicleModal')">&times;</button>
                </div>
                <form id="addVehicleForm" onsubmit="submitAddVehicle(event)">
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label" for="add_owner">Owner (Customer)</label>
                            <select class="form-control" id="add_owner" name="customerId" required>
                                <option value="" disabled selected>Select Customer...</option>
                                <option th:each="c : ${customers}" th:value="${c.customerId}" th:text="${c.name} + ' (' + ${c.phone} + ')'"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="add_plate">License Plate Number</label>
                            <input class="form-control" type="text" id="add_plate" name="vehicleNumber" required placeholder="e.g. MH-12-AB-1234">
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="form-label" for="add_brand">Brand / Manufacturer</label>
                                <input class="form-control" type="text" id="add_brand" name="brand" required placeholder="e.g. Toyota">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="add_model">Model</label>
                                <input class="form-control" type="text" id="add_model" name="model" required placeholder="e.g. Corolla">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="add_year">Year of Manufacture</label>
                            <input class="form-control" type="number" id="add_year" name="year" required min="1900" max="2030" placeholder="e.g. 2021">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('addVehicleModal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Vehicle</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Edit Vehicle Modal -->
        <div id="editVehicleModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">Edit Vehicle Details</h2>
                    <button class="modal-close" onclick="closeModal('editVehicleModal')">&times;</button>
                </div>
                <form id="editVehicleForm" onsubmit="submitEditVehicle(event)">
                    <input type="hidden" id="edit_id" name="vehicleId">
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label" for="edit_owner">Owner (Customer)</label>
                            <select class="form-control" id="edit_owner" name="customerId" required>
                                <option th:each="c : ${customers}" th:value="${c.customerId}" th:text="${c.name} + ' (' + ${c.phone} + ')'"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="edit_plate">License Plate Number</label>
                            <input class="form-control" type="text" id="edit_plate" name="vehicleNumber" required>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="form-label" for="edit_brand">Brand / Manufacturer</label>
                                <input class="form-control" type="text" id="edit_brand" name="brand" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="edit_model">Model</label>
                                <input class="form-control" type="text" id="edit_model" name="model" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="edit_year">Year of Manufacture</label>
                            <input class="form-control" type="number" id="edit_year" name="year" required min="1900" max="2030">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('editVehicleModal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Update Vehicle</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Custom JS integrations for Vehicles -->
        <script>
            async function submitAddVehicle(event) {
                event.preventDefault();
                const data = serializeForm('addVehicleForm');
                try {
                    await apiRequest('/api/vehicle/create', 'POST', data);
                    showToast('Vehicle registered successfully!');
                    closeModal('addVehicleModal');
                    setTimeout(() => location.reload(), 800);
                } catch(e) {
                    showToast('Registration failed: ' + e.message, 'danger');
                }
            }

            async function editVehicle(id) {
                try {
                    const vehicle = await apiRequest(`/api/vehicle/${id}`, 'GET');
                    document.getElementById('edit_id').value = vehicle.vehicleId;
                    document.getElementById('edit_owner').value = vehicle.customerId;
                    document.getElementById('edit_plate').value = vehicle.vehicleNumber;
                    document.getElementById('edit_brand').value = vehicle.brand;
                    document.getElementById('edit_model').value = vehicle.model;
                    document.getElementById('edit_year').value = vehicle.year;
                    openModal('editVehicleModal');
                } catch(e) {
                    showToast('Could not load vehicle data: ' + e.message, 'danger');
                }
            }

            async function submitEditVehicle(event) {
                event.preventDefault();
                const data = serializeForm('editVehicleForm');
                try {
                    // Update vehicle in the backend (using same create endpoint which maps ID and saves/updates)
                    await apiRequest('/api/vehicle/create', 'POST', data);
                    showToast('Vehicle details updated successfully!');
                    closeModal('editVehicleModal');
                    setTimeout(() => location.reload(), 800);
                } catch(e) {
                    showToast('Update failed: ' + e.message, 'danger');
                }
            }

            async function deleteVehicle(id) {
                if (confirm('Are you sure you want to delete this vehicle? All bookings for this vehicle will be affected.')) {
                    try {
                        const result = await apiRequest(`/api/vehicle/${id}`, 'DELETE');
                        showToast(result || 'Vehicle removed successfully.');
                        setTimeout(() => location.reload(), 800);
                    } catch(e) {
                        showToast('Deletion failed: ' + e.message, 'danger');
                    }
                }
            }
        </script>
    </div>
</body>
</html>
