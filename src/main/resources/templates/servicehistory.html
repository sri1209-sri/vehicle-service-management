 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout :: page(~{::title}, ~{::#content}, 'history')}">
<head>
    <title>Service History Logs | Vehi-Serve Admin</title>
</head>
<body>
    <div id="content">
        <div class="card">
            <div class="card-header">
                <div class="card-title">Completed Service Logs</div>
            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>History ID</th>
                            <th>Service Date</th>
                            <th>Vehicle Number</th>
                            <th>Model / Make</th>
                            <th>Remarks &amp; Work Done</th>
                            <th>Total Cost</th>
                            <th class="no-print" style="width: 200px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="h : ${history}">
                            <td th:text="${h.historyId}">1</td>
                            <td style="font-weight: 500;" th:text="${h.serviceDate}">2026-06-18</td>
                            <td th:text="${h.booking.vehicle.vehicleNumber}">MH-12-AB-1234</td>
                            <td th:text="${h.booking.vehicle.brand} + ' ' + ${h.booking.vehicle.model}">Toyota Corolla</td>
                            <td th:text="${h.remarks}">Changed spark plugs and synthetic oil</td>
                            <td style="font-weight: 600; color: var(--text-primary);">₹<span th:text="${#numbers.formatDecimal(h.totalCost, 1, 2)}">79.99</span></td>
                            <td class="no-print">
                                <div style="display: flex; gap: 0.5rem;">
                                    <button class="btn btn-primary btn-sm" th:onclick="'generateInvoice(' + ${h.historyId} + ', ' + ${h.totalCost} + ')'">Generate Invoice</button>
                                    <button class="btn btn-secondary btn-sm" style="color: var(--danger);" th:onclick="'deleteHistory(' + ${h.historyId} + ')'">Delete</button>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(history)}">
                            <td colspan="7" style="text-align: center; color: var(--text-secondary); padding: 2rem;">No service history entries found. Complete active bookings to log them here!</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <script>
            async function generateInvoice(historyId, totalCost) {
                const today = new Date().toISOString().split('T')[0];
                const payload = {
                    historyId: parseInt(historyId),
                    amount: parseFloat(totalCost),
                    invoiceDate: today,
                    paymentStatus: 'PENDING'
                };

                try {
                    // Check if an invoice already exists for this service history ID
                    const allInvoices = await apiRequest('/api/invoice/all', 'GET');
                    const exists = allInvoices.some(inv => inv.historyId === historyId);
                    
                    if (exists) {
                        showToast('An invoice has already been generated for this record!', 'warning');
                        setTimeout(() => window.location.href = '/invoices', 1000);
                        return;
                    }

                    await apiRequest('/api/invoice/create', 'POST', payload);
                    showToast('Invoice generated successfully! Redirecting...');
                    setTimeout(() => window.location.href = '/invoices', 1200);
                } catch(e) {
                    showToast('Invoice generation failed: ' + e.message, 'danger');
                }
            }

            async function deleteHistory(id) {
                if (confirm('Are you sure you want to delete this service history log? Warning: If an invoice was generated for this history log, you must delete that invoice first.')) {
                    try {
                        const result = await apiRequest(`/api/service-history/delete/${id}`, 'DELETE');
                        showToast(result || 'Service history log deleted successfully.');
                        setTimeout(() => location.reload(), 800);
                    } catch(e) {
                        showToast('Deletion failed: ' + e.message, 'danger');
                    }
                }
            }
        </script>
    </div>
</body>
</html>
